<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz de Ciências</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

#quiz{
    background:white;
    padding:20px;
    border-radius:10px;
    width:500px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
}

button{
    display:block;
    width:100%;
    padding:10px;
    margin:8px 0;
    cursor:pointer;
    border:none;
    border-radius:5px;
    background:#3498db;
    color:white;
    font-size:16px;
}

button:hover{
    background:#2980b9;
}

#resultado{
    margin-top:15px;
    font-weight:bold;
}

#reiniciar{
    background:#27ae60;
}
</style>
</head>
<body>

<div id="quiz">
    <h1>Quiz de Ciências</h1>

    <div id="pergunta"></div>

    <div id="alternativas"></div>

    <div id="resultado"></div>

    <button id="reiniciar" style="display:none;">
        Reiniciar Quiz
    </button>
</div>

<script src="perguntas.js"></script>
<script src="script.js"></script>

</body>
</html>
